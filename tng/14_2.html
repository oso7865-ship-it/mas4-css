<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./14_2.css">
  <title>I want You!</title>
</head>
<body>
  <div class="container">
    <form action="">
      <fieldset>
        <legend>I want YOU!</legend>
        <div class="input-box">
          <label for="name" class="required-catgory">이름</label>
          <input type="text" id="name" class="name" required>
        </div>
        <div class="input-box">
          <label for="age" class="required-catgory">나이</label>
          <input type="number" min="20" id="age" class="age" required>
        </div>
        <div class="input-box">
          <span class="required-catgory">성별</span>
          <input type="radio" name="gender" id="male">
          <label for="male">남자</label>
          <input type="radio" name="gender" id="female">
          <label for="female">여자</label>
        </div>
        <div class="input-box">
          <label for="memo" class="vertical-aling">요청사항</label>
          <textarea name="memo" id="memo" placeholder="요청사항 입력"></textarea>
        </div>
        <button type="submit" class="btn-send">보내기</button>
      </fieldset>
    </form>
  </div>
</body>
</html>
